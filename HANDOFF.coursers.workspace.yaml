- id: coursers-1
  name: crs-filter-posttooluse
  priority: P1
  status: done
  title: Implement `crs filter` PostToolUse hook — output compression
  description: |
    Core value-add of crs. Reads PostToolUse JSON payload, matches command against
    filter rules in .ctx/crs-filters.toml (project) or ~/.config/crs/filters.toml (global),
    applies filter mode (failures-only, errors-only, truncate, passthrough), emits
    compressed output as hook message with decision: allow.
  files:
  - crates/crs/src/main.rs
  - crates/core/src/filters.rs
  extra: []
  completed: 2026-04-06

- id: coursers-2
  name: crs-rewrite-pretooluse
  priority: P1
  status: done
  title: Implement `crs rewrite` PreToolUse hook — optional command rewriting
  description: |
    Narrow scope: only rewrites when changing how a command runs (e.g. force --format json).
    Exit 0 + rewritten command on stdout, exit 1 = passthrough unchanged.
    Rewrite rules defined in crs-filters.toml alongside filter rules.
  files:
  - crates/crs/src/main.rs
  - crates/core/src/rewrite.rs
  extra: []
  completed: 2026-04-06

- id: coursers-3
  name: crs-filters-toml-schema
  priority: P1
  status: done
  title: Define crs-filters.toml schema and config loader
  description: |
    TOML schema for filter and rewrite rules. Config hierarchy:
      1. .ctx/crs-filters.toml (project-local, wins)
      2. ~/.config/crs/filters.toml (global fallback)
    Filter modes: failures-only, errors-only, truncate, passthrough, custom.
    Rewrite rules: pattern + replace string.
  files:
  - crates/core/src/filters.rs
  - crates/core/src/config.rs
  extra: []
  completed: 2026-04-06

- id: coursers-4
  name: crs-discover
  priority: P2
  status: done
  title: Implement `crs discover` — scan Claude Code history for missed savings
  description: |
    Read ~/.claude/projects/**/*.jsonl, extract Bash tool calls, identify commands
    that match filter/rewrite rules but weren't intercepted. Output savings report
    similar to rtk discover. Top unhandled from current data: doob todo (737),
    cargo nextest (439), cargo xtask (412), nu (249).
  files:
  - crates/crs/src/main.rs
  - crates/core/src/history.rs
  extra: []
  completed: 2026-04-06

