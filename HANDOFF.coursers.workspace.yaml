- id: coursers-7
  name: crs-validate
  priority: P2
  status: done
  title: Add `crs validate` — rule health check against available commands
  description: |
    Checks each rule: pattern compiles, known trigger examples fire, known exception
    examples are correctly bypassed, alternative tools (bun, uv) are on PATH.
    Found and fixed: no-grep-use-tool -A/-B/-C exceptions used \b which did not
    match -A3 (no space). Changed to [0-9 ].
  files:
  - crates/crs/src/main.rs
  - ~/.claude/hooks/course-correct-rules.json
  extra: []
  completed: 2026-04-06

- id: coursers-8
  name: crs-probe
  priority: P2
  status: done
  title: Add `crs probe` — interactive rule inspection
  description: |
    Reads a command from stdin (raw string, {"command":"..."}, or hook-style
    {"tool_input":{"command":"..."}}). Shows per-rule verdict: BLOCK, ALLOW
    (pattern matched but exception overrides), or PASS. BLOCK output lists the
    message and all exceptions so the user knows what form would be allowed.
  files:
  - crates/crs/src/main.rs
  extra: []
  completed: 2026-04-06

