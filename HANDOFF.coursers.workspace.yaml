- id: coursers-10
  name: rtk-adapter
  priority: P1
  status: done
  completed: 2026-04-06
  title: RTK integration — RtkAnalysis/RtkRewrite ports + ProcessRtkClient adapter
  description: |
    Two-trait capability split (ISP group B): RtkAnalysis (discover, gain, session,
    verify, hook_audit, version) and RtkRewrite (rewrite, probe, check, list_proxies, flush).
    ProcessRtkClient shells out to rtk binary; NullRtkClient no-ops when rtk absent.
    crs discover enriches HANDOFF.tools.yaml with rtk_equivalent + savings figures from
    rtk discover --format json. obfsck_audit pipes YAML through obfsck --audit before write.
  files:
  - crates/core/src/rtk.rs
  - crates/crs/src/rtk/mod.rs
  - crates/crs/src/rtk/process.rs
  - crates/crs/src/main.rs
  extra: []

- id: coursers-11
  name: obfsck-mcp-server
  priority: P2
  status: open
  title: Build obfsck MCP server + mcpipe integration for custom filter generation
  description: |
    Add server mode to obfsck exposing two MCP tools: audit (pipe content, return hits)
    and generate-filters (given examples, suggest .ctx/obfsck-filters.yaml patterns).
    mcpipe maps the server automatically. crs discover calls mcpipe -> obfsck MCP to
    generate project-local obfsck filters saved to .ctx/obfsck-filters.yaml.
    obfsck_audit picks up --config .ctx/obfsck-filters.yaml when present.
  files:
  - crates/crs/src/main.rs
  extra: []

